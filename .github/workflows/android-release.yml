name: Build and publish Android TV APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version sans v, par exemple 1.2.0"
        required: true
        default: "1.1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Determine release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAG="${GITHUB_REF_NAME}"
          else
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
          fi
          echo "VERSION_NAME=${VERSION}" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$((100000 + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Restore signing key
        shell: bash
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build signed release APK
        run: ./gradlew clean lintRelease assembleRelease --no-daemon

      - name: Prepare APK
        shell: bash
        run: cp app/build/outputs/apk/release/app-release.apk Younes-${VERSION_NAME}.apk

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Younes-${{ env.VERSION_NAME }}
          path: Younes-${{ env.VERSION_NAME }}.apk

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$RELEASE_TAG" "Younes-${VERSION_NAME}.apk" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Younes ${VERSION_NAME}" \
            --generate-notes \
            --target "$GITHUB_SHA"
